name: dart_query
description: >-
  TanStack Query for Dart. Automatic caching, stale-while-revalidate,
  background refetching, mutations with optimistic updates, infinite queries.
  Pure Dart - no Flutter dependency.
version: 0.1.0
homepage: https://github.com/AhmedAbouelworworoud/dart_query
repository: https://github.com/AhmedAbouelworworoud/dart_query
issue_tracker: https://github.com/AhmedAbouelworworoud/dart_query/issues
topics:
  - cache
  - state-management
  - query
  - api
  - data-fetching

environment:
  sdk: ^3.5.0

dependencies:
  meta: ^1.9.0

dev_dependencies:
  test: ^1.24.0
  fake_async: ^1.3.0

resolution: workspace
