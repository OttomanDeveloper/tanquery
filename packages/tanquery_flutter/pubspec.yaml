name: tanquery_flutter
description: >-
  Flutter adapter for tanquery. Widget builders for automatic caching,
  stale-while-revalidate, and background refetching. QueryBuilder,
  MutationBuilder, InfiniteQueryBuilder.
version: 0.8.0
homepage: https://github.com/OttomanDeveloper/tanquery
repository: https://github.com/OttomanDeveloper/tanquery
issue_tracker: https://github.com/OttomanDeveloper/tanquery/issues
topics:
  - flutter
  - cache
  - state-management
  - query
  - widgets

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  tanquery: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter

resolution: workspace
