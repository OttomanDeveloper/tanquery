name: tanquery_devtools
description: >-
  Visual devtools overlay for tanquery. Inspect query cache, mutation log,
  and query states in real-time with a floating panel overlay.
version: 0.7.1
homepage: https://github.com/OttomanDeveloper/tanquery
repository: https://github.com/OttomanDeveloper/tanquery
issue_tracker: https://github.com/OttomanDeveloper/tanquery/issues
topics:
  - flutter
  - devtools
  - debugging
  - cache
  - state-management

environment:
  sdk: ^3.5.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  tanquery: ^0.7.0
  tanquery_flutter: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

resolution: workspace
