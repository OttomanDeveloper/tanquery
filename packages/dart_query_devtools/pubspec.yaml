name: dart_query_devtools
description: >-
  Visual devtools overlay for dart_query. Inspect query cache, mutation log,
  and query states in real-time with a floating panel overlay.
version: 0.1.0
homepage: https://github.com/OttomanDeveloper/dart_query
repository: https://github.com/OttomanDeveloper/dart_query
issue_tracker: https://github.com/OttomanDeveloper/dart_query/issues
topics:
  - flutter
  - devtools
  - debugging
  - cache
  - state-management

environment:
  sdk: ^3.5.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  dart_query:
    path: ../dart_query
  dart_query_flutter:
    path: ../dart_query_flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

resolution: workspace
