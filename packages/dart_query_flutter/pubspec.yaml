name: dart_query_flutter
description: >-
  Flutter adapter for dart_query. Widget builders for automatic caching,
  stale-while-revalidate, and background refetching. QueryBuilder,
  MutationBuilder, InfiniteQueryBuilder.
version: 0.1.0
homepage: https://github.com/AhmedAbouelworworoud/dart_query
repository: https://github.com/AhmedAbouelworworoud/dart_query
issue_tracker: https://github.com/AhmedAbouelworworoud/dart_query/issues
topics:
  - flutter
  - cache
  - state-management
  - query
  - widgets

environment:
  sdk: ^3.5.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  dart_query:
    path: ../dart_query

dev_dependencies:
  flutter_test:
    sdk: flutter

resolution: workspace
