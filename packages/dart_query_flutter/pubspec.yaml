version: 0.1.0
homepage: https://github.com/AhmedAbouelworworoud/dart_query

environment:
  sdk: ^3.5.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  dart_query:
    path: ../dart_query

dev_dependencies:
  flutter_test:
    sdk: flutter

resolution: workspace
